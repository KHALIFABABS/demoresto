<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Saveurs Express - Commander en ligne</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        /* Header & Navigation */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 2rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Menu Hamburger */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .bar {
            width: 25px;
            height: 3px;
            background: #667eea;
            margin: 3px 0;
            transition: 0.3s;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #667eea;
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 2rem 2rem 2rem;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 3rem;
            margin-bottom: 3rem;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* Menu Grid */
        .menu-section {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 3rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .menu-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #667eea;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .menu-item {
            background: #f8f9fa;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .item-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .item-info {
            padding: 1.5rem;
        }

        .item-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .item-description {
            color: #666;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .item-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 1rem;
        }

        .add-to-cart {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .add-to-cart:hover {
            transform: scale(1.05);
        }

        /* Panier */
        .cart-section {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 3rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .cart-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #667eea;
        }

        .cart-items {
            max-height: 300px;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: bold;
        }

        .cart-item-price {
            color: #667eea;
        }

        .cart-item-remove {
            background: #ff4757;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            cursor: pointer;
        }

        .cart-total {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid #eee;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: right;
        }

        /* Client Management */
        .client-section {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 3rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .client-form {
            display: grid;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .client-form input,
        .client-form textarea {
            padding: 0.8rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }

        .client-form input:focus,
        .client-form textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn-whatsapp:hover {
            transform: scale(1.05);
        }

        .client-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .client-card {
            background: #f8f9fa;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: white;
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            }

            .nav-links.active {
                display: flex;
            }

            .container {
                padding: 80px 1rem 1rem 1rem;
            }

            .hero h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon">🍔</div>
                <div class="logo-text">Saveurs Express</div>
            </div>
            <div class="menu-toggle" onclick="toggleMenu()">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="#menu">Menu</a></li>
                <li><a href="#cart">Mon Panier</a></li>
                <li><a href="#clients">Clients</a></li>
            </ul>
        </div>
    </div>

    <div class="container">
        <!-- Hero Section -->
        <div class="hero">
            <h1>🍕 Saveurs Express 🍜</h1>
            <p>Les meilleures saveurs livrées chez vous en 30 minutes !</p>
            <p style="margin-top: 1rem;">📞 77 686 86 25  | 📍 Livraison gratuite dès 500 fr</p>
        </div>

        <!-- Menu Section -->
        <div class="menu-section" id="menu">
            <h2 class="menu-title">Notre Menu</h2>
            <div class="menu-grid" id="menuGrid"></div>
        </div>

        <!-- Panier Section -->
        <div class="cart-section" id="cart">
            <h2 class="cart-title">🛒 Mon Panier</h2>
            <div id="cartItems" class="cart-items"></div>
            <div id="cartTotal" class="cart-total"></div>
            <button class="btn-whatsapp" onclick="commanderWhatsApp()">
                📲 Commander sur WhatsApp
            </button>
        </div>

        <!-- Client Management -->
        <div class="client-section" id="clients">
            <h2 class="cart-title">👥 Gestion Clients</h2>
            <div class="client-form">
                <input type="text" id="clientName" placeholder="Nom du client">
                <input type="tel" id="clientPhone" placeholder="Téléphone">
                <textarea id="clientAddress" rows="2" placeholder="Adresse de livraison"></textarea>
                <button class="btn-primary" onclick="ajouterClient()">Ajouter Client</button>
            </div>
            <h3>Liste des clients réguliers</h3>
            <div id="clientList" class="client-list"></div>
        </div>
    </div>

    <script>
        // Menu des produits
        const menu = [
            { id: 1, name: "🍔 Burger Deluxe", description: "Double steak, cheddar, salade, tomate, sauce maison", price: 12.90, emoji: "🍔" },
            { id: 2, name: "🍕 Pizza Margherita", description: "Sauce tomate, mozzarella, basilic frais", price: 11.90, emoji: "🍕" },
            { id: 3, name: "🥗 Caesar Salad", description: "Poulet grillé, parmesan, croutons, sauce césar", price: 9.90, emoji: "🥗" },
            { id: 4, name: "🍝 Pasta Carbonara", description: "Spaghettis, crème, lardons, parmesan", price: 10.90, emoji: "🍝" },
            { id: 5, name: "🥪 Club Sandwich", description: "Poulet, bacon, laitue, tomate, mayonnaise", price: 8.90, emoji: "🥪" },
            { id: 6, name: "🍦 Dessert du Chef", description: "Tiramisu maison", price: 5.90, emoji: "🍦" }
        ];

        // Panier
        let cart = [];

        // Clients
        let clients = [];

        // Charger les données depuis localStorage
        function loadData() {
            const savedCart = localStorage.getItem('cart');
            const savedClients = localStorage.getItem('clients');
            
            if (savedCart) cart = JSON.parse(savedCart);
            if (savedClients) clients = JSON.parse(savedClients);
            
            updateCartDisplay();
            updateClientList();
        }

        // Sauvegarder les données
        function saveData() {
            localStorage.setItem('cart', JSON.stringify(cart));
            localStorage.setItem('clients', JSON.stringify(clients));
        }

        // Afficher le menu
        function displayMenu() {
            const menuGrid = document.getElementById('menuGrid');
            menuGrid.innerHTML = menu.map(item => `
                <div class="menu-item" onclick="ajouterAuPanier(${item.id})">
                    <div class="item-image">${item.emoji}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-description">${item.description}</div>
                        <div class="item-price">${item.price.toFixed(2)} €</div>
                        <button class="add-to-cart">Ajouter au panier</button>
                    </div>
                </div>
            `).join('');
        }

        // Ajouter au panier
        function ajouterAuPanier(productId) {
            const product = menu.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            saveData();
            updateCartDisplay();
            
            // Animation de confirmation
            alert(`${product.name} ajouté au panier !`);
        }

        // Mettre à jour l'affichage du panier
        function updateCartDisplay() {
            const cartItemsDiv = document.getElementById('cartItems');
            const cartTotalDiv = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<p style="text-align: center; color: #999;">Votre panier est vide</p>';
                cartTotalDiv.innerHTML = 'Total: 0.00 €';
                return;
            }
            
            cartItemsDiv.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div>Quantité: ${item.quantity}</div>
                        <div class="cart-item-price">${(item.price * item.quantity).toFixed(2)} €</div>
                    </div>
                    <button class="cart-item-remove" onclick="retirerDuPanier(${item.id})">Supprimer</button>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotalDiv.innerHTML = `Total: ${total.toFixed(2)} €`;
        }

        // Retirer du panier
        function retirerDuPanier(productId) {
            const index = cart.findIndex(item => item.id === productId);
            if (index !== -1) {
                if (cart[index].quantity > 1) {
                    cart[index].quantity--;
                } else {
                    cart.splice(index, 1);
                }
                saveData();
                updateCartDisplay();
            }
        }

        // Commander via WhatsApp
        function commanderWhatsApp() {
            if (cart.length === 0) {
                alert("Votre panier est vide ! Ajoutez des articles avant de commander.");
                return;
            }
            
            let message = "🍔 *NOUVELLE COMMANDE* 🍕\n\n";
            message += "*Menu Commandé:*\n";
            
            cart.forEach(item => {
                message += `• ${item.name} x${item.quantity} = ${(item.price * item.quantity).toFixed(2)}€\n`;
            });
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `\n*Total:* ${total.toFixed(2)}€\n\n`;
            message += "*Informations Client:*\n";
            message += `Nom: ${prompt("Votre nom:", "Client")}\n`;
            message += `Téléphone: ${prompt("Votre téléphone:", "06XXXXXXXX")}\n`;
            message += `Adresse: ${prompt("Votre adresse de livraison:", "Adresse complète")}\n`;
            message += `\n_Commande à préparer pour livraison_ 🚚`;
            
            // Encoder le message pour URL
            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/221776868625?text=${encodedMessage}`; // Remplacer par votre numéro
            
            window.open(whatsappUrl, '_blank');
            
            // Optionnel: Vider le panier après commande
            if (confirm("Commande envoyée ! Voulez-vous vider votre panier ?")) {
                cart = [];
                saveData();
                updateCartDisplay();
            }
        }

        // Ajouter un client
        function ajouterClient() {
            const name = document.getElementById('clientName').value;
            const phone = document.getElementById('clientPhone').value;
            const address = document.getElementById('clientAddress').value;
            
            if (!name || !phone) {
                alert("Veuillez remplir au moins le nom et le téléphone !");
                return;
            }
            
            const newClient = {
                id: Date.now(),
                name: name,
                phone: phone,
                address: address,
                date: new Date().toLocaleDateString()
            };
            
            clients.push(newClient);
            saveData();
            updateClientList();
            
            // Vider le formulaire
            document.getElementById('clientName').value = '';
            document.getElementById('clientPhone').value = '';
            document.getElementById('clientAddress').value = '';
            
            alert("Client ajouté avec succès !");
        }

        // Mettre à jour la liste des clients
        function updateClientList() {
            const clientListDiv = document.getElementById('clientList');
            
            if (clients.length === 0) {
                clientListDiv.innerHTML = '<p style="text-align: center; color: #999;">Aucun client enregistré</p>';
                return;
            }
            
            clientListDiv.innerHTML = clients.map(client => `
                <div class="client-card">
                    <strong>${client.name}</strong><br>
                    📞 ${client.phone}<br>
                    ${client.address ? `📍 ${client.address}<br>` : ''}
                    📅 ${client.date}<br>
                    <button onclick="commanderPourClient('${client.name}', '${client.phone}')" 
                            style="margin-top: 10px; padding: 5px 10px; background: #25D366; color: white; border: none; border-radius: 5px; cursor: pointer;">
                        📲 Commander pour ce client
                    </button>
                </div>
            `).join('');
        }

        // Commander pour un client existant
        function commanderPourClient(name, phone) {
            if (cart.length === 0) {
                alert("Le panier est vide ! Ajoutez des articles avant de commander.");
                return;
            }
            
            let message = "🍔 *NOUVELLE COMMANDE* 🍕\n\n";
            message += "*Menu Commandé:*\n";
            
            cart.forEach(item => {
                message += `• ${item.name} x${item.quantity} = ${(item.price * item.quantity).toFixed(2)}€\n`;
            });
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `\n*Total:* ${total.toFixed(2)}€\n\n`;
            message += "*Informations Client:*\n";
            message += `Nom: ${name}\n`;
            message += `Téléphone: ${phone}\n`;
            message += `\n_Commande à préparer pour livraison_ 🚚`;
            
            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/221776868625?text=${encodedMessage}`;
            
            window.open(whatsappUrl, '_blank');
        }

        // Toggle menu mobile
        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            navLinks.classList.toggle('active');
        }

        // Smooth scroll pour la navigation
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                    if (window.innerWidth <= 768) {
                        toggleMenu();
                    }
                }
            });
        });

        // Initialisation
        displayMenu();
        loadData();
        
        // Mettre à jour le numéro WhatsApp (à personnaliser)
        // Pour changer le numéro, modifiez le numéro dans les fonctions commanderWhatsApp et commanderPourClient
    </script>
</body>
</html>
